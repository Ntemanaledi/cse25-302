<html lang<head><html lang="en">

    <title>Contact</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header class="bg-dark text-white py-3">

    <div class="container" style="max-width: 900px;">

        <div class="d-flex align-items-center">
            <img src="images/logo.jpg" width="80" class="me-2">
            <h4 class="mb-0">Naledi Motor Center</h4>
        </div>

        <nav class="mt-3 text-center">
            <a class="nav-link-custom" href="index.html">Home</a>
            <a class="nav-link-custom" href="catalog.html">Catalog</a>
            <a class="nav-link-custom" href="about.html">About</a>
            <a class="nav-link-custom" href="contact.html">Contact</a>
        </nav>

    </div>

</header>

<div class="container mt-5 flex-fill">

    <h2 class="text-center text-white">Contact Us</h2>

    <form id="contactForm" class="bg-dark text-white p-4 rounded mt-4" style="max-width:500px; margin:auto;">

        <input type="text" class="form-control mb-3" placeholder="Your Name" required>

        <input type="email" class="form-control mb-3" placeholder="Your Email" required>

        <textarea class="form-control mb-3" placeholder="Message" rows="4" required></textarea>

        <button type="submit" class="btn btn-warning w-100">Send</button>

    </form>

    <p id="message" class="text-center text-white mt-3"></p>

</div>

<footer class="bg-dark text-white p-3 mt-4">

    <div class="container" style="max-width: 900px;">

        <div class="d-flex justify-content-between">

            <div>
                <p class="mb-1"><strong>Business Hours</strong></p>
                <p class="mb-0">Mon – Fri: 8:00 AM – 6:00 PM</p>
                <p class="mb-0">Sat – Sun: 8:00 AM – 1:00 PM</p>
            </div>

            <div class="text-end">
                <p class="mb-1"><strong>Location</strong></p>
                <p class="mb-0">Motloutse St, Plot 23456</p>
                <p class="mb-0">Gaborone, Botswana</p>
            </div>

        </div>

        <p class="text-center mt-3 mb-0">© 2026 Naledi Motor Center</p>

    </div>

</footer>
<script src="js/script.js"></script>

</body>
</html>
